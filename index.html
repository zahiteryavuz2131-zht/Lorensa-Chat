<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Lorensa Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--b0:#1e1f22;--b1:#2b2d31;--b2:#313338;--b3:#383a40;--bi:#383a40;--bf:#111214;--t1:#f2f3f5;--t2:#b5bac1;--tm:#949ba4;--tl:#00a8fc;--ac:#5865f2;--ah:#4752c4;--gn:#23a559;--rd:#da373c;--yl:#f0b232;--bd:rgba(0,0,0,.24);--r:8px;--rs:4px;--tr:all .15s ease;--fm:15px}
[data-theme="light"]{--b0:#e3e5e8;--b1:#f2f3f5;--b2:#fff;--b3:#ebedef;--bi:#ebedef;--bf:#fff;--t1:#060607;--t2:#4e5058;--tm:#80848e;--bd:rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:var(--b0);color:var(--t1);-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--b0);border-radius:3px}
input,textarea,select,button{font-family:inherit}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--b0);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
#splash.hide{opacity:0;pointer-events:none}
.spl{width:80px;height:80px;background:var(--ac);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;color:#fff;margin-bottom:16px;animation:sp 2s infinite}
@keyframes sp{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.spb{width:160px;height:3px;background:var(--b3);border-radius:2px;overflow:hidden;margin-top:12px}
.spf{height:100%;background:var(--ac);animation:sl 1.2s ease forwards}
@keyframes sl{from{width:0}to{width:100%}}

/* AUTH */
#authPage{display:none;min-height:100vh;background:var(--ac);justify-content:center;align-items:center;padding:20px}
#authPage.show{display:flex}
.acard{background:var(--bf);border-radius:var(--r);padding:32px;width:100%;max-width:480px;box-shadow:0 2px 10px rgba(0,0,0,.3);max-height:95vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.acard h2{font-size:24px;font-weight:700;text-align:center;margin-bottom:20px;color:var(--t1)}
.atabs{display:flex;background:var(--b0);border-radius:var(--rs);overflow:hidden;margin-bottom:20px}
.atab{flex:1;padding:12px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;color:var(--tm);border:none;background:transparent;transition:var(--tr)}
.atab.on{background:var(--ac);color:#fff}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;color:var(--t2);margin-bottom:6px}
.fi{width:100%;padding:12px;background:var(--b0);border:none;border-radius:var(--rs);color:var(--t1);font-size:16px;outline:none;transition:var(--tr)}
.fi:focus{box-shadow:0 0 0 2px var(--ac)}
.fi::placeholder{color:var(--tm)}
.abtn{width:100%;padding:14px;background:var(--ac);color:#fff;border:none;border-radius:var(--rs);font-size:16px;font-weight:600;cursor:pointer;margin-top:4px}
.abtn:hover{background:var(--ah)}
.aor{text-align:center;color:var(--tm);font-size:12px;margin:16px 0;position:relative}
.aor::before,.aor::after{content:'';position:absolute;top:50%;width:calc(50% - 16px);height:1px;background:var(--b3)}
.aor::before{left:0}.aor::after{right:0}
.gbtn{width:100%;padding:12px;background:#fff;border:1px solid #dadce0;border-radius:var(--rs);color:#3c4043;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.gbtn:hover{background:#f8f9fa}
.asw{text-align:center;margin-top:12px;font-size:13px;color:var(--tm)}
.asw a{color:var(--tl);cursor:pointer;font-weight:600}
.amsg{padding:10px;border-radius:var(--rs);font-size:13px;margin-bottom:12px;display:none}
.amsg.err{display:block;background:rgba(218,55,60,.15);color:var(--rd)}
.amsg.ok{display:block;background:rgba(35,165,89,.15);color:var(--gn)}

/* GOOGLE MODAL */
#gModal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:5000;display:none;justify-content:center;align-items:center;padding:16px}
#gModal.show{display:flex}
.gcard{background:#fff;border-radius:12px;width:100%;max-width:400px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.2);position:relative;max-height:90vh;overflow-y:auto}
.gcard h3{font-size:16px;color:#202124;font-weight:400;margin-top:12px;text-align:center}
.gcard p{font-size:13px;color:#5f6368;text-align:center;margin-top:4px;margin-bottom:16px}
.gbod{padding:0 24px 24px}
.gacc{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid #dadce0;border-radius:10px;cursor:pointer;margin-bottom:8px}
.gacc:hover{background:#f8f9fa;border-color:#4285f4}
.gacc .av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#4285f4,#34a853);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0}
.gacc .inf{flex:1;min-width:0}.gacc .inf .n{font-weight:600;color:#202124;font-size:13px}.gacc .inf .e{font-size:11px;color:#5f6368}
.gsep{text-align:center;color:#5f6368;font-size:12px;margin:12px 0}
.ginp{width:100%;padding:10px 14px;border:1px solid #dadce0;border-radius:6px;font-size:14px;outline:none;margin-bottom:8px;color:#202124}
.ginp:focus{border-color:#4285f4}
.gsbtn{width:100%;padding:10px;background:#1a73e8;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
.gsbtn:hover{background:#1557b0}
.gcls{position:absolute;top:8px;right:8px;width:28px;height:28px;border:none;background:transparent;color:#5f6368;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}

/* APP */
#appPage{display:none;height:100vh;width:100vw}
#appPage.show{display:block}
.appw{display:flex;height:100%;position:relative}
.mob-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:197;display:none}
.appw.mop .mob-ov{display:block}

/* Servers */
.sbar{width:72px;min-width:72px;background:var(--b0);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:8px;overflow-y:auto;z-index:200}
.srv{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--tr);position:relative;font-weight:700;font-size:18px;color:var(--t2);background:var(--b2);flex-shrink:0}
.srv:hover,.srv.on{border-radius:16px;background:var(--ac);color:#fff}
.srv.on::before{content:'';position:absolute;left:-16px;width:8px;height:40px;background:#fff;border-radius:0 4px 4px 0}
.srv.hm{background:var(--ac);color:#fff}
.ssep{width:32px;height:2px;background:var(--b3);flex-shrink:0}
.srv.add{background:var(--b2);color:var(--gn);font-size:20px}
.srv.add:hover{background:var(--gn);color:#fff;border-radius:16px}

/* Sidebar */
.side{width:240px;min-width:240px;background:var(--b1);display:flex;flex-direction:column;z-index:199}
.shead{height:48px;padding:0 16px;display:flex;align-items:center;font-weight:600;font-size:15px;box-shadow:0 1px 0 var(--bd);flex-shrink:0;cursor:pointer}
.shead:hover{background:rgba(255,255,255,.04)}
.chlist{flex:1;overflow-y:auto;padding:0 8px}
.cat{padding:16px 0 4px;font-size:12px;font-weight:700;text-transform:uppercase;color:var(--tm);display:flex;align-items:center;justify-content:space-between}
.cat .cadd{opacity:0;cursor:pointer;font-size:12px}.cat:hover .cadd{opacity:1}
.ch{display:flex;align-items:center;gap:6px;padding:7px 8px;border-radius:var(--rs);cursor:pointer;color:var(--tm);font-size:14px;font-weight:500;transition:var(--tr);margin:1px 0}
.ch:hover{background:rgba(255,255,255,.04);color:var(--t2)}
.ch.on{background:var(--b3);color:var(--t1)}
.ch i{font-size:18px;width:20px;text-align:center;flex-shrink:0}
.ch .cname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* User area */
.uarea{padding:0 8px;height:52px;background:var(--bf);display:flex;align-items:center;gap:8px;flex-shrink:0}
.uav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;position:relative;flex-shrink:0;background-size:cover;background-position:center}
.uav .dot{position:absolute;bottom:-1px;right:-1px;width:12px;height:12px;border-radius:50%;border:3px solid var(--bf)}
.don{background:var(--gn)}.dof{background:#80848e}
.uinfo{flex:1;min-width:0}.uinfo .un{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.uinfo .ut{font-size:11px;color:var(--tm)}
.ubtn{width:32px;height:32px;border:none;border-radius:var(--rs);background:transparent;color:var(--tm);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}.ubtn:hover{background:var(--b3);color:var(--t1)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--b2)}
.chahead{height:48px;padding:0 16px;display:flex;align-items:center;box-shadow:0 1px 0 var(--bd);flex-shrink:0;gap:8px}
.mtog{display:none;width:36px;height:36px;border:none;background:transparent;color:var(--tm);cursor:pointer;font-size:20px;border-radius:var(--rs)}
.chahead .cicon{color:var(--tm);font-size:20px}
.chahead .ctitle{font-weight:700;font-size:16px}
.chahead .ctopic{font-size:13px;color:var(--tm);margin-left:8px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hbtn{width:32px;height:32px;border:none;border-radius:var(--rs);background:transparent;color:var(--tm);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}.hbtn:hover{color:var(--t1)}

/* Messages */
.msgs{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.mwel{padding:16px 0 24px}
.mwel h3{font-size:28px;font-weight:800;margin-bottom:8px}
.mwel p{color:var(--tm);font-size:14px}
.mg{display:flex;gap:12px;padding:3px 0;position:relative;border-radius:var(--rs)}
.mg:hover{background:rgba(255,255,255,.02)}
.mg:hover .macts{display:flex}
.mav2{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;flex-shrink:0;cursor:pointer;background-size:cover;background-position:center;margin-top:2px}
.mbody{flex:1;min-width:0}
.mhead{display:flex;align-items:baseline;gap:4px;flex-wrap:wrap}
.mname{font-weight:600;font-size:var(--fm);cursor:pointer}.mname:hover{text-decoration:underline}
.mbadge{font-size:10px;padding:0 4px;border-radius:3px;font-weight:700;line-height:16px}
.b-adm{background:var(--rd);color:#fff}.b-off{background:var(--ac);color:#fff}.b-tur{background:linear-gradient(135deg,#ff6b9d,#c44dff);color:#fff}
.mtime{font-size:12px;color:var(--tm)}
.mtxt{font-size:var(--fm);line-height:1.4;color:var(--t2);word-wrap:break-word;white-space:pre-wrap}
.mtxt .men{background:rgba(88,101,242,.15);color:var(--ac);padding:0 2px;border-radius:3px;font-weight:500;cursor:pointer}
.mtxt .men:hover{background:rgba(88,101,242,.3)}
.mimg{max-width:90%;max-height:300px;border-radius:var(--r);margin-top:4px;cursor:pointer}
.macts{position:absolute;top:-12px;right:8px;background:var(--b1);border:1px solid var(--bd);border-radius:var(--rs);display:none;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.mact{width:30px;height:30px;border:none;background:transparent;color:var(--tm);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}.mact:hover{color:var(--t1);background:rgba(255,255,255,.04)}
.smsg{padding:4px 0;font-size:13px;color:var(--tm);text-align:center}
.rbs{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.rb{display:flex;align-items:center;gap:3px;padding:2px 6px;border-radius:var(--rs);font-size:13px;cursor:pointer;border:1px solid var(--bd);background:var(--b0)}.rb.on{border-color:var(--ac);background:rgba(88,101,242,.1)}.rb:hover{background:rgba(255,255,255,.04)}

/* Input */
.minput{padding:0 16px 16px}
.mbox{background:var(--bi);border-radius:var(--r);display:flex;align-items:flex-end}
.mboxb{width:44px;height:44px;border:none;background:transparent;color:var(--tm);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}.mboxb:hover{color:var(--t1)}
#mInput{flex:1;background:transparent;border:none;color:var(--t1);font-size:16px;padding:12px 0;resize:none;outline:none;max-height:200px;min-height:22px;line-height:1.375;font-family:inherit}
#mInput::placeholder{color:var(--tm)}

/* Mention popup */
.mnpop{position:absolute;bottom:100%;left:0;right:0;background:var(--bf);border-radius:var(--r);box-shadow:0 4px 16px rgba(0,0,0,.3);display:none;max-height:200px;overflow-y:auto;z-index:50;margin-bottom:4px}.mnpop.show{display:block}
.mni{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;transition:var(--tr)}.mni:hover,.mni.sel{background:var(--ac);color:#fff;border-radius:var(--rs)}
.mniav{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700;flex-shrink:0}

/* Emoji */
.epick{position:absolute;bottom:52px;right:8px;width:300px;background:var(--bf);border:1px solid var(--bd);border-radius:var(--r);box-shadow:0 4px 16px rgba(0,0,0,.3);display:none;z-index:100}.epick.show{display:block}
.egrid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;padding:8px;max-height:200px;overflow-y:auto}
.ebtn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:var(--rs);cursor:pointer;font-size:20px;border:none;background:transparent}.ebtn:hover{background:var(--b3);transform:scale(1.1)}

/* File preview */
.fprev{padding:6px 16px;display:none;align-items:center;gap:8px;background:var(--bi);border-radius:var(--r) var(--r) 0 0;margin:0 16px;font-size:13px;color:var(--t2)}.fprev.show{display:flex}

/* Modals */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;justify-content:center;align-items:center;padding:16px}.modal-bg.show{display:flex}
.modal{background:var(--b2);border-radius:var(--r);width:100%;max-width:440px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.modh{padding:16px 20px;display:flex;align-items:center;justify-content:space-between}.modh h3{font-size:18px;font-weight:700}
.modx{width:32px;height:32px;border:none;background:transparent;color:var(--tm);cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}.modx:hover{background:var(--b3)}
.modb{padding:0 20px 20px}
.modf{padding:12px 20px;background:var(--b1);display:flex;justify-content:flex-end;gap:8px}
.btn{padding:10px 20px;border:none;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.bp{background:var(--ac);color:#fff}.bp:hover{background:var(--ah)}
.bs2{background:transparent;color:var(--t2)}
.bd2{background:var(--rd);color:#fff}
.bg2{background:var(--gn);color:#fff}

/* Profile popup */
#profPop{position:fixed;width:300px;background:var(--bf);border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,.3);z-index:1500;display:none;overflow:hidden}
#profPop.show{display:block}

/* Settings */
#setPage{position:fixed;inset:0;background:var(--b2);z-index:2000;display:none}
#setPage.show{display:flex}

/* Toast */
.toast{position:fixed;top:20px;right:20px;background:var(--bf);border:1px solid var(--bd);border-radius:var(--r);padding:12px 16px;box-shadow:0 4px 16px rgba(0,0,0,.3);z-index:9999;max-width:280px;font-size:13px}

/* MOBILE */
@media(max-width:768px){
    .sbar{position:fixed;left:0;top:0;bottom:0;width:72px;transform:translateX(-100%);transition:transform .25s ease;z-index:200}
    .side{position:fixed;left:72px;top:0;bottom:0;width:calc(100vw - 72px);max-width:280px;transform:translateX(calc(-100% - 72px));transition:transform .25s ease;z-index:199}
    .appw.mop .sbar{transform:translateX(0)}
    .appw.mop .side{transform:translateX(0)}
    .mtog{display:flex!important}
    .ctopic{display:none!important}
    #profPop{width:90vw!important;max-width:300px;top:50%!important;left:50%!important;transform:translate(-50%,-50%)!important}
    .epick{position:fixed;bottom:0;left:0;right:0;width:100%;border-radius:12px 12px 0 0;max-height:50vh}
    .egrid{grid-template-columns:repeat(7,1fr)}
    .mnpop{position:fixed;bottom:60px;left:10px;right:10px}
    .mwel h3{font-size:22px}
}
@media(max-width:400px){
    .acard{padding:20px}
    .acard h2{font-size:20px}
    .srv{width:42px;height:42px;font-size:15px}
    .sbar{width:56px}
    .mav2{width:34px;height:34px;font-size:12px}
}
</style>
</head>
<body>

<div id="splash"><div class="spl"><i class="fas fa-comments"></i></div><div style="font-size:20px;font-weight:800">Lorensa Chat</div><div style="font-size:11px;color:var(--tm);margin-top:3px">Yapımcı: Zahit Eryavuz</div><div class="spb"><div class="spf"></div></div></div>

<!-- GOOGLE MODAL -->
<div id="gModal"><div class="gcard"><button class="gcls" onclick="Q('gModal').classList.remove('show')"><i class="fas fa-times"></i></button><div style="padding:24px 24px 16px;text-align:center"><svg width="74" height="24" viewBox="0 0 74 24"><path fill="#4285F4" d="M9.24 8.19v2.46h5.88a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1 0-.78-.07-1.53-.2-2.25H9.24z"/><path fill="#34A853" d="M9.24 18.36c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H.92v2.84C2.73 15.89 5.74 18.36 9.24 18.36z"/><path fill="#FBBC05" d="M3.08 11.46c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V4.44H.92C.17 5.92-.24 7.59-.24 9.37s.41 3.45 1.16 4.93l2.16-2.84z"/><path fill="#EA4335" d="M9.24 3.75c1.62 0 3.06.56 4.21 1.64l3.15-3.15C14.69.46 12.21-.63 9.24-.63 5.74-.63 2.73 1.84.92 4.44l3.16 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg><h3>Hesap seçin</h3><p>Lorensa Chat'e devam etmek için</p></div><div class="gbod"><div id="gAccList"></div><div class="gsep">veya yeni hesap</div><input class="ginp" id="gEmail" placeholder="E-posta" type="email"><input class="ginp" id="gName" placeholder="Ad Soyad"><button class="gsbtn" onclick="googleNew()">Devam Et</button></div></div></div>

<!-- AUTH -->
<div id="authPage"><div class="acard">
<h2 id="authTitle">Hoş Geldin!</h2>
<div class="atabs"><div class="atab on" onclick="authMode('login')">Giriş Yap</div><div class="atab" onclick="authMode('register')">Kayıt Ol</div></div>
<div id="authMsg" class="amsg"></div>
<div id="loginFields">
    <div class="fg"><label>E-POSTA VEYA KULLANICI ADI</label><input class="fi" id="loginEmail" placeholder="E-posta veya kullanıcı adı"></div>
    <div class="fg"><label>ŞİFRE</label><input class="fi" id="loginPass" type="password" placeholder="Şifre"></div>
    <button class="abtn" onclick="doLogin()">Giriş Yap</button>
</div>
<div id="regFields" style="display:none">
    <div class="fg"><label>E-POSTA</label><input class="fi" id="regEmail" placeholder="ornek@mail.com" type="email"></div>
    <div class="fg"><label>KULLANICI ADI</label><input class="fi" id="regUser" placeholder="kullaniciadi"></div>
    <div class="fg"><label>ŞİFRE</label><input class="fi" id="regPass" type="password" placeholder="En az 6 karakter"></div>
    <button class="abtn" onclick="doRegister()">Kayıt Ol</button>
</div>
<div class="aor">veya</div>

<script>
// ===== CORE =====
const Q=id=>document.getElementById(id);
const DB={

    s:(k,v)=>localStorage.setItem('lc_'+k,JSON.stringify(v)),

const COLORS=['#5865f2','#57f287','#ed4245','#fee75c','#eb459e','#9b59b6','#e67e22','#1abc9c','#e74c3c','#3498db'];
const getColor=s=>{let h=0;for(let i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return COLORS[Math.abs(h)%COLORS.length]};
const genTag=()=>'#'+String(Math.floor(Math.random()*9999)).padStart(4,'0');
const genId=p=>p+'_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);
const timeAgo=t=>{const d=new Date(t),n=new Date(),df=n-d;if(df<6e4)return'şimdi';if(df<36e5)return Math.floor(df/6e4)+'dk';if(d.toDateString()===n.toDateString())return'Bugün '+d.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});return d.toLocaleDateString('tr-TR')+' '+d.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})};
const EMOJIS='😀😁😂🤣😃😄😅😆😉😊😋😎😍🥰😘🙂🤗🤩🤔😐😶🙄😏😥😮😯😫😴😌😛😜😝😒😔😕🙃😲🙁😤😢😭😨😩🤯😬😰😱😳🤪😡😠🤬😈💀💩🤡👻👽🤖👋✋👌✌️🤞👍👎✊👊👏🤝🙏💪❤️🧡💛💚💙💜🖤💔💕💝⭐✨⚡🔥💥🎉🎊🎵🎮🏆🎯🚀💎🌈💯✅❌❓❗💤💬'.match(/./gu);

let me=null, curServer=null, curChannel=null, curView='home', selectedFile=null, mentionIdx=-1;

// ===== DATABASE INIT =====

// ===== AUTH =====
function authMode(mode){
    document.querySelectorAll('.atab').forEach((t,i)=>{
        t.classList.toggle('on',(mode==='login'&&i===0)||(mode==='register'&&i===1));
    });
    Q('loginFields').style.display = mode==='login' ? 'block' : 'none';
    Q('regFields').style.display = mode==='register' ? 'block' : 'none';
    Q('authTitle').textContent = mode==='login' ? 'Hoş Geldin!' : 'Hesap Oluştur';
    Q('authSwitch').innerHTML = mode==='login' 
        ? 'Hesabın yok mu? <a onclick="authMode(\'register\')">Kayıt Ol</a>'
        : 'Hesabın var mı? <a onclick="authMode(\'login\')">Giriş Yap</a>';
    Q('authMsg').className = 'amsg';
}

function showError(msg){ Q('authMsg').className='amsg err'; Q('authMsg').textContent=msg; }
function showSuccess(msg){ Q('authMsg').className='amsg ok'; Q('authMsg').textContent=msg; }

function doLogin(){
    const emailOrUser = Q('loginEmail').value.trim();
    const password = Q('loginPass').value;
    
    if(!emailOrUser || !password){
        return showError('Lütfen tüm alanları doldurun.');
    }
    
    const users = DB.g('users') || [];
    const searchLower = emailOrUser.toLowerCase();
    
    // Case-insensitive arama: email, username veya displayName ile
    const user = users.find(u => {
        const emailMatch = u.email && u.email.toLowerCase() === searchLower;
        const usernameMatch = u.username && u.username.toLowerCase() === searchLower;
        const displayMatch = u.displayName && u.displayName.toLowerCase() === searchLower;
        return (emailMatch || usernameMatch || displayMatch) && u.password === password;
    });
    
    if(!user){
        // Debug: Kayıtlı kullanıcıları göster
        console.log('Kayıtlı kullanıcılar:', users.map(u=>({username:u.username, email:u.email, displayName:u.displayName})));
        return showError('E-posta veya şifre hatalı. Lütfen tekrar deneyin.');
    }
    
    if(user.banned) return showError('Bu hesap yasaklanmış.');
    
    user.status = 'online';
    DB.s('users', users);
    me = user;
    DB.s('currentUser', user.id);
    enterApp();
}

function doRegister(){
    const email = Q('regEmail').value.trim();
    const username = Q('regUser').value.trim();
    const password = Q('regPass').value;
    
    if(!email || !username || !password){
        return showError('Lütfen tüm alanları doldurun.');
    }
    if(password.length < 6) return showError('Şifre en az 6 karakter olmalı.');
    if(username.length < 2) return showError('Kullanıcı adı en az 2 karakter olmalı.');
    if(!email.includes('@')) return showError('Geçerli bir e-posta girin.');
    
    const users = DB.g('users') || [];
    
    // Varolan kontrol - case insensitive
    if(users.find(u => u.email && u.email.toLowerCase() === email.toLowerCase())){
        return showError('Bu e-posta zaten kayıtlı.');
    }
    if(users.find(u => u.username && u.username.toLowerCase() === username.toLowerCase())){
        return showError('Bu kullanıcı adı zaten alınmış.');
    }
    
    const newUser = {
        id: genId('user'),
        username: username.toLowerCase(),
        displayName: username,
        email: email.toLowerCase(),
        password: password,
        role: 'member',
        tag: genTag(),
        status: 'online',
        about: '',
        createdAt: Date.now(),
        color: getColor(username),
        banned: false,
        turbo: null,
        turboExp: null,
        avatar: null,
        badges: [],
        friends: [],
        pendingFriends: []
    };
    
    users.push(newUser);
    DB.s('users', users);
    
    // Ana sunucuya ekle
    const servers = DB.g('servers') || [];
    const mainSrv = servers.find(s => s.id === 'srv1');
    if(mainSrv && !mainSrv.members.includes(newUser.id)){
        mainSrv.members.push(newUser.id);
        DB.s('servers', servers);
    }
    
    console.log('Yeni kullanıcı kaydedildi:', {username: newUser.username, email: newUser.email, id: newUser.id});
    
    showSuccess('Hesap oluşturuldu! Şimdi giriş yapabilirsin.');
    authMode('login');
    Q('loginEmail').value = email;
}

// Enter tuşu ile giriş
document.addEventListener('DOMContentLoaded', ()=>{
    Q('loginPass')?.addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
    Q('regPass')?.addEventListener('keydown', e=>{ if(e.key==='Enter') doRegister(); });
});

// ===== GOOGLE AUTH =====
function openGoogle(){
    const accounts = DB.g('gAccounts') || [];
    const list = Q('gAccList');
    list.innerHTML = '';
    accounts.forEach(a => {
        list.innerHTML += `<div class="gacc" onclick="googleSelect('${a.email}')">
            <div class="av">${a.name[0].toUpperCase()}</div>
            <div class="inf"><div class="n">${a.name}</div><div class="e">${a.email}</div></div>
        </div>`;
    });
    Q('gEmail').value = '';
    Q('gName').value = '';
    Q('gModal').classList.add('show');
}

function googleSelect(email){
    const accounts = DB.g('gAccounts') || [];
    const acc = accounts.find(a => a.email === email);
    if(acc) processGoogleUser(acc.email, acc.name);
    Q('gModal').classList.remove('show');
}

function googleNew(){
    const email = Q('gEmail').value.trim();
    const name = Q('gName').value.trim();
    if(!email || !email.includes('@')) return alert('Geçerli bir e-posta girin.');
    if(!name) return alert('Adınızı girin.');
    
    const accounts = DB.g('gAccounts') || [];
    if(!accounts.find(a => a.email === email)){
        accounts.push({email, name});
        DB.s('gAccounts', accounts);
    }
    processGoogleUser(email, name);
    Q('gModal').classList.remove('show');
}

function processGoogleUser(email, name){
    const users = DB.g('users') || [];
    let user = users.find(u => u.email && u.email.toLowerCase() === email.toLowerCase());
    
    if(!user){
        user = {
            id: genId('user'),
            username: name.replace(/\s/g,'').toLowerCase(),
            displayName: name,
            email: email.toLowerCase(),
            password: Math.random().toString(36).substr(2,10),
            role: 'member', tag: genTag(), status: 'online',
            about: '', createdAt: Date.now(), color: getColor(name),
            banned: false, turbo: null, turboExp: null, avatar: null,
            badges: ['google'], friends: [], pendingFriends: []
        };
        users.push(user);
        
        const servers = DB.g('servers') || [];
        const mainSrv = servers.find(s => s.id === 'srv1');
        if(mainSrv && !mainSrv.members.includes(user.id)){
            mainSrv.members.push(user.id);
            DB.s('servers', servers);
        }
    }
    
    user.status = 'online';
    DB.s('users', users);
    me = user;
    DB.s('currentUser', user.id);
    enterApp();
}

function logout(){
    if(me){
        const users = DB.g('users') || [];
        const u = users.find(x => x.id === me.id);
        if(u){ u.status = 'offline'; DB.s('users', users); }
    }
    me = null;
    DB.d('currentUser');
    Q('setPage').classList.remove('show');
    Q('appPage').classList.remove('show');
    Q('authPage').classList.add('show');
}

// ===== APP =====
function enterApp(){
    Q('authPage').classList.remove('show');
    Q('appPage').classList.add('show');
    updateUserArea();
    renderServers();
    goHome();
}

function updateUserArea(){
    if(!me) return;
    const av = Q('userAvatar');
    if(me.avatar){
        av.style.background = `url(${me.avatar}) center/cover`;
        Q('userLetter').textContent = '';
    } else {
        av.style.background = me.color;
        Q('userLetter').textContent = me.displayName[0].toUpperCase();
    }
    Q('userName').textContent = me.displayName;
    Q('userTag').textContent = me.username;
    document.querySelector('.uarea .dot').className = 'dot d' + (me.status==='online'?'on':'of');
}

// ===== SERVERS =====
function renderServers(){
    const bar = Q('serverBar');
    bar.innerHTML = `<div class="srv hm ${!curServer?'on':''}" onclick="goHome()"><i class="fas fa-comments"></i></div><div class="ssep"></div>`;
    
    const servers = DB.g('servers') || [];
    servers.forEach(s => {
        if(!s.members.includes(me.id)) return;
        bar.innerHTML += `<div class="srv ${curServer?.id===s.id?'on':''}" onclick="selectServer('${s.id}')" style="${curServer?.id===s.id?`background:${s.color};color:#fff`:''}">${s.name[0]}</div>`;
    });
    
    bar.innerHTML += `<div class="srv add" onclick="openModal('createSrvModal')"><i class="fas fa-plus"></i></div>`;
}

function selectServer(serverId){
    const servers = DB.g('servers') || [];
    curServer = servers.find(s => s.id === serverId);
    if(!curServer) return;
    curView = 'server';
    renderServers();
    Q('sideTitle').textContent = curServer.name;
    renderChannels();
    // İlk metin kanalını seç
    for(const cat of curServer.categories){
        for(const ch of cat.channels){
            if(ch.type === 'text'){ selectChannel(ch.id); return; }
        }
    }
    closeMobileSidebar();
}

function renderChannels(){
    if(!curServer) return;
    const el = Q('channelList');
    el.innerHTML = '';
    
    curServer.categories.forEach(cat => {
        el.innerHTML += `<div class="cat"><span>${cat.name}</span><span class="cadd" onclick="event.stopPropagation();openModal('createChModal')"><i class="fas fa-plus"></i></span></div>`;
        cat.channels.forEach(ch => {
            const icon = ch.type === 'voice' ? 'fa-volume-up' : 'fa-hashtag';
            const isActive = curChannel?.id === ch.id ? ' on' : '';
            el.innerHTML += `<div class="ch${isActive}" onclick="selectChannel('${ch.id}')"><i class="fas ${icon}"></i><span class="cname">${ch.name}</span></div>`;
        });
    });
}

function selectChannel(channelId){
    if(!curServer) return;
    curChannel = null;
    curServer.categories.forEach(cat => {
        cat.channels.forEach(ch => {
            if(ch.id === channelId) curChannel = ch;
        });
    });
    if(!curChannel) return;
    curView = 'server';
    renderChannels();
    renderChatView();
    closeMobileSidebar();

// ===== CHAT VIEW =====
function renderChatView(){
    const isDM = curView === 'dm';
    const main = Q('mainArea');
    
    main.innerHTML = `
    <div class="chahead">
        <button class="mtog" onclick="toggleMob()"><i class="fas fa-bars"></i></button>
        <i class="fas ${isDM?'fa-at':'fa-hashtag'} cicon"></i>

            <button class="mboxb" onclick="toggleEmoji()"><i class="fas fa-face-smile"></i></button>
            <button class="mboxb" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
        <div class="epick" id="emojiPicker"></div>
        <input type="file" id="fileInput" style="display:none" onchange="handleFileSelect(event)" accept="image/*,video/*,audio/*,.gif,.pdf,.doc,.zip">
    </div>`;
    
    renderMessages();
    scrollToBottom();
}

function renderMessages(){
    if(!curChannel) return;
    const isDM = curView === 'dm';
    const store = isDM ? 'dms' : 'messages';
    const allMessages = (DB.g(store) || {})[curChannel.id] || [];
    const users = DB.g('users') || [];
    const el = Q('messageList');
    if(!el) return;
    el.innerHTML = '';
    
    allMessages.forEach(msg => {
        if(msg.type === 'system'){
            el.innerHTML += `<div class="smsg">${formatText(msg.text)}</div>`;
            return;
        }
        
        const user = users.find(u => u.id === msg.uid);
        if(!user) return;
        
        const color = user.color || getColor(user.id);
        let badges = '';
        if(user.role === 'admin') badges += '<span class="mbadge b-adm">ADMIN</span> ';
        if(user.isOfficial) badges += '<span class="mbadge b-off">RESMİ</span> ';
        
        let content = formatText(msg.text);
        
        // Dosya gösterimi
        if(msg.file){
            if(msg.file.type?.startsWith('image/') || msg.file.name?.endsWith('.gif')){
                content += `<br><img src="${msg.file.data}" class="mimg" onclick="window.open(this.src)">`;
            } else if(msg.file.type?.startsWith('video/')){
                content += `<br><video src="${msg.file.data}" controls style="max-width:100%;max-height:300px;border-radius:var(--r);margin-top:4px"></video>`;
            } else if(msg.file.type?.startsWith('audio/')){
                content += `<br><audio src="${msg.file.data}" controls style="margin-top:4px;max-width:100%"></audio>`;
            } else {
                content += `<div style="display:inline-flex;align-items:center;gap:8px;padding:10px;background:var(--b1);border:1px solid var(--bd);border-radius:var(--r);margin-top:4px"><i class="fas fa-file" style="font-size:20px;color:var(--tm)"></i><span style="color:var(--tl)">${msg.file.name}</span></div>`;
            }
        }
        
        if(msg.edited) content += ' <span style="font-size:10px;color:var(--tm)">(düzenlendi)</span>';
        
        // Reactions
        let reactions = '';
        if(msg.reactions?.length){
            reactions = '<div class="rbs">' + msg.reactions.map(r => 
                `<div class="rb ${r.u.includes(me.id)?'on':''}" onclick="toggleReaction('${msg.id}','${r.e}')">${r.e} <span style="font-size:12px;color:var(--tm)">${r.u.length}</span></div>`
            ).join('') + '</div>';
        }
        
        const avatarStyle = user.avatar 
            ? `background:url(${user.avatar}) center/cover` 
            : `background:${color}`;
        
        el.innerHTML += `
        <div class="mg" ${msg.pinned?'style="border-left:2px solid var(--yl);padding-left:6px"':''}>
            <div class="mav2" style="${avatarStyle}" onclick="showProfile('${user.id}')">${user.avatar?'':user.displayName[0].toUpperCase()}</div>
            <div class="mbody">
                <div class="mhead">

// ===== TEXT FORMATTING WITH @MENTIONS =====
function formatText(text){
    if(!text) return '';
    const users = DB.g('users') || [];
    
    // @everyone @here
    text = text.replace(/@everyone/g, '<span class="men">@everyone</span>');
    text = text.replace(/@here/g, '<span class="men">@here</span>');
    
    // @username mentions
    text = text.replace(/@(\S+)/g, (match, name) => {
        const u = users.find(x => 
            (x.username && x.username.toLowerCase() === name.toLowerCase()) || 
            (x.displayName && x.displayName.toLowerCase() === name.toLowerCase())
        );
        if(u) return `<span class="men" onclick="showProfile('${u.id}')">@${u.displayName}</span>`;
        return match;
    });
    
    // Markdown
    text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
    text = text.replace(/~~(.*?)~~/g, '<del>$1</del>');
    text = text.replace(/```([\s\S]*?)```/g, '<pre style="background:var(--b0);padding:8px;border-radius:4px;font-family:monospace;font-size:13px;margin:4px 0;white-space:pre-wrap">$1</pre>');
    text = text.replace(/`(.*?)`/g, '<code style="background:var(--b0);padding:2px 5px;border-radius:3px;font-family:monospace;font-size:13px">$1</code>');
    text = text.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" style="color:var(--tl)">$1</a>');
    text = text.replace(/\n/g, '<br>');
    
    return text;
}

// ===== MENTION AUTOCOMPLETE =====
function checkMentions(textarea){
    const val = textarea.value;
    const pos = textarea.selectionStart;
    const before = val.substring(0, pos);
    const match = before.match(/@(\S*)$/);
    
    if(match){
        const query = match[1].toLowerCase();
        const users = DB.g('users') || [];
        let results = [];
        
        if(curServer){
            results = curServer.members
                .map(mid => users.find(u => u.id === mid))
                .filter(u => u && (
                    (u.username && u.username.toLowerCase().includes(query)) || 
                    (u.displayName && u.displayName.toLowerCase().includes(query))
                ))
                .slice(0, 6);
        } else {
            results = users.filter(u => 
                (u.username && u.username.toLowerCase().includes(query)) || 
                (u.displayName && u.displayName.toLowerCase().includes(query))
            ).slice(0, 6);
        }
        
        // Özel etiketler
        if(!query || 'everyone'.startsWith(query))
            results.unshift({id:'_ev', displayName:'everyone', username:'everyone', color:'#5865f2', special:true});
        if(!query || 'here'.startsWith(query))
            results.unshift({id:'_hr', displayName:'here', username:'here', color:'#23a559', special:true});
        
        if(results.length > 0){
            const popup = Q('mentionPopup');
            if(!popup) return;
            popup.innerHTML = results.map((u, i) => `
                <div class="mni ${i===0?'sel':''}" onclick="insertMention('${u.username}')">
                    <div class="mniav" style="background:${u.color || getColor(u.id||'x')}">${u.special ? '@' : u.displayName[0].toUpperCase()}</div>
                    <span style="font-size:14px;font-weight:500">${u.displayName}</span>
                    ${!u.special ? `<span style="font-size:11px;color:var(--tm);margin-left:auto">${u.username}</span>` : ''}
                </div>
            `).join('');
            popup.classList.add('show');
            mentionIdx = 0;
            return;
        }
    }
    
    const popup = Q('mentionPopup');
    if(popup) popup.classList.remove('show');
    mentionIdx = -1;
}

function insertMention(username){
    const ta = Q('mInput');
    const val = ta.value;
    const pos = ta.selectionStart;
    const before = val.substring(0, pos).replace(/@\S*$/, '@' + username + ' ');
    ta.value = before + val.substring(pos);
    ta.focus();
    const popup = Q('mentionPopup');
    if(popup) popup.classList.remove('show');
    mentionIdx = -1;
}

// ===== SEND MESSAGE =====
function sendMessage(){
    const input = Q('mInput');
    const text = input.value.trim();
    if(!text && !selectedFile) return;
    
    const msgObj = {
        id: genId('msg'),
        uid: me.id,
        text: text,
        ts: Date.now(),
        reactions: [],
        pinned: false,
        edited: false
    };
    
    if(selectedFile){
        msgObj.file = selectedFile;
        clearFile();
    }
    
    const store = curView === 'dm' ? 'dms' : 'messages';
    const data = DB.g(store) || {};
    if(!data[curChannel.id]) data[curChannel.id] = [];
    data[curChannel.id].push(msgObj);
    DB.s(store, data);
    
    input.value = '';
    input.style.height = 'auto';
    renderMessages();
    
    if(text.startsWith('/')) handleCommand(text);
}

function handleCommand(text){
    const msgs = DB.g('messages') || {};
    const cmd = text.split(' ')[0].toLowerCase();
    let reply = '';
    
    switch(cmd){
        case '/help': reply = '📋 Komutlar: `/help` `/ping` `/roll` `/flip` `/clear`'; break;
        case '/ping': reply = '🏓 Pong! ' + Math.floor(Math.random()*40+5) + 'ms'; break;
        case '/roll': reply = '🎲 ' + Math.floor(Math.random()*6+1); break;
        case '/flip': reply = '🪙 ' + (Math.random()>.5 ? 'Yazı' : 'Tura'); break;
        case '/clear': 
            if(me.role==='admin'){ msgs[curChannel.id]=[]; DB.s('messages',msgs); renderMessages(); return; }
            reply = '❌ Yetki yok.'; break;
        default: reply = '❓ Bilinmeyen komut. `/help` yazın.';
    }
    
    if(reply){
        if(!msgs[curChannel.id]) msgs[curChannel.id] = [];
        msgs[curChannel.id].push({id:genId('msg'), uid:'admin1', text:reply, ts:Date.now()+200, reactions:[], pinned:false, edited:false});
        DB.s('messages', msgs);
        setTimeout(renderMessages, 200);
    }
}

function handleKey(e){
    const popup = Q('mentionPopup');
    if(popup?.classList.contains('show')){
        const items = document.querySelectorAll('.mni');
        if(e.key==='ArrowDown'){ e.preventDefault(); mentionIdx=Math.min(mentionIdx+1,items.length-1); items.forEach((t,i)=>t.classList.toggle('sel',i===mentionIdx)); }
        else if(e.key==='ArrowUp'){ e.preventDefault(); mentionIdx=Math.max(mentionIdx-1,0); items.forEach((t,i)=>t.classList.toggle('sel',i===mentionIdx)); }
        else if(e.key==='Enter'||e.key==='Tab'){ e.preventDefault(); if(items[mentionIdx]) items[mentionIdx].click(); }
        else if(e.key==='Escape'){ popup.classList.remove('show'); }
        return;
    }
    if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
}

function deleteMessage(msgId){
    const store = curView==='dm' ? 'dms' : 'messages';
    const data = DB.g(store);
    if(data[curChannel.id]) data[curChannel.id] = data[curChannel.id].filter(m => m.id !== msgId);
    DB.s(store, data);

}

function editMessage(msgId){
    const store = curView==='dm' ? 'dms' : 'messages';
    const data = DB.g(store);
    const msg = data[curChannel.id]?.find(m => m.id === msgId);
    if(!msg) return;
    const newText = prompt('Mesajı düzenle:', msg.text);
    if(newText !== null){ msg.text = newText; msg.edited = true; DB.s(store, data); renderMessages(); }
}

function toggleReaction(msgId, emoji){
    const store = curView==='dm' ? 'dms' : 'messages';
    const data = DB.g(store);
    const msg = data[curChannel.id]?.find(m => m.id === msgId);
    if(!msg) return;
    if(!msg.reactions) msg.reactions = [];
    let reaction = msg.reactions.find(r => r.e === emoji);
    if(!reaction){ reaction = {e:emoji, u:[]}; msg.reactions.push(reaction); }
    const idx = reaction.u.indexOf(me.id);
    if(idx > -1) reaction.u.splice(idx, 1);
    else reaction.u.push(me.id);
    if(reaction.u.length === 0) msg.reactions = msg.reactions.filter(r => r.e !== emoji);
    DB.s(store, data);
    renderMessages();
}

function replyTo(msgId){
    const store = curView==='dm' ? 'dms' : 'messages';
    const data = DB.g(store);
    const msg = data[curChannel.id]?.find(m => m.id === msgId);
    if(!msg) return;
    const users = DB.g('users') || [];
    const u = users.find(x => x.id === msg.uid);
    Q('mInput').value = `> ${u?.displayName||'?'}: ${msg.text.substring(0,40)}…\n`;
    Q('mInput').focus();
}

function handleFileSelect(e){
    const file = e.target.files[0];
    if(!file) return;
    if(file.size > 8*1024*1024){ alert('Dosya max 8MB olabilir.'); return; }
    
    const reader = new FileReader();
    reader.onload = ev => {
        selectedFile = {name:file.name, type:file.type, size:(file.size/1024).toFixed(1)+' KB', data:ev.target.result};
        Q('filePreview').classList.add('show');
        Q('filePrevText').textContent = `📎 ${file.name} (${selectedFile.size})`;
    };
    
    if(file.type.startsWith('image/') || file.type.startsWith('video/') || file.type.startsWith('audio/'))
        reader.readAsDataURL(file);
    else {
        selectedFile = {name:file.name, type:file.type, size:(file.size/1024).toFixed(1)+' KB', data:null};
        Q('filePreview').classList.add('show');
        Q('filePrevText').textContent = `📎 ${file.name}`;
    }
    e.target.value = '';
}

function createServer(){

    const server = {
        id: genId('srv'), name, desc: '', color: COLORS[Math.floor(Math.random()*COLORS.length)],

        categories: [
            {id:genId('cat'), name:'Yazışma', channels:[{id:genId('ch'), name:'genel', type:'text', topic:'Genel sohbet'}]},
            {id:genId('cat'), name:'Ses', channels:[{id:genId('ch'), name:'Genel Ses', type:'voice', users:[]}]}
        ],
        pub: true, createdAt: Date.now()
    };
    
    servers.push(server);
    DB.s('servers', servers);
    
    const msgs = DB.g('messages') || {};
    server.categories[0].channels.forEach(ch => {
        msgs[ch.id] = [{id:genId('msg'), uid:'system', text:`🎉 **${name}** sunucusu oluşturuldu!`, ts:Date.now(), type:'system'}];
    });

function createChannel(){
    if(!curServer) return;
    const name = Q('newChName').value.trim().toLowerCase().replace(/\s+/g, '-');
    const type = Q('newChType').value;
    if(!name) return alert('Kanal adı gerekli.');
    
    const servers = DB.g('servers') || [];
    const srv = servers.find(s => s.id === curServer.id);
    if(!srv) return;
    
    const channel = {id: genId('ch'), name, type};
    if(type === 'voice') channel.users = [];
    
    // İlk kategoriye ekle
    if(srv.categories.length > 0){
        srv.categories[0].channels.push(channel);
    }
    
    DB.s('servers', servers);
    curServer = srv;
    
    if(type === 'text'){
        const msgs = DB.g('messages') || {};
        msgs[channel.id] = [];
        DB.s('messages', msgs);
    }
    
    closeModal('createChModal');
    Q('newChName').value = '';
    renderChannels();
    if(type === 'text') selectChannel(channel.id);
}

                </div>
                <div style="display:flex;justify-content:space-between;padding:10px 0;border-top:1px solid rgba(255,255,255,.04)">
                    <div><div style="font-size:14px">E-posta</div><div style="font-size:12px;color:var(--tm)">${me.email}</div></div>
                </div>
            </div>
        </div>
    </div>`;
    Q('setPage').classList.add('show');
}

function setTheme(){
    const current = document.documentElement.getAttribute('data-theme');
    if(current === 'light'){
        document.documentElement.removeAttribute('data-theme');
        DB.s('theme', 'dark');
    } else {
        document.documentElement.setAttribute('data-theme', 'light');
        DB.s('theme', 'light');
    }
}

// ===== CALL (Basic) =====
async function startCall(){
    if(curView !== 'dm') return;
    try {
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        alert('🔊 Sesli arama başlatıldı! (Demo mod)');
        setTimeout(() => { stream.getTracks().forEach(t => t.stop()); }, 1000);
    } catch(e) {
        alert('Mikrofon erişimi reddedildi.');
    }
}

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
    if(e.key === 'Escape'){
        Q('setPage').classList.remove('show');
        document.querySelectorAll('.modal-bg.show').forEach(m => m.classList.remove('show'));
        Q('emojiPicker')?.classList.remove('show');
        Q('profPop').classList.remove('show');
        Q('gModal').classList.remove('show');
        Q('mentionPopup')?.classList.remove('show');
    }
});

document.addEventListener('click', e => {
    const pp = Q('profPop');
    if(pp?.classList.contains('show') && !pp.contains(e.target)) pp.classList.remove('show');
    const ep = Q('emojiPicker');
    if(ep?.classList.contains('show') && !ep.contains(e.target) && !e.target.closest('.mboxb')) ep.classList.remove('show');
});

// ===== STARTUP =====
window.addEventListener('load', () => {
    const theme = DB.g('theme');
    if(theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
    
    setTimeout(() => {
        Q('splash').classList.add('hide');
        
        const savedUserId = DB.g('currentUser');
        if(savedUserId){
            const users = DB.g('users') || [];
            const user = users.find(u => u.id === savedUserId);
            if(user && !user.banned){
                user.status = 'online';
                DB.s('users', users);
                me = user;
                enterApp();
                return;
            }
        }
        
        Q('authPage').classList.add('show');
    }, 1500);
});
</script>
</body>
