<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lorensa Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root{
            --bg-0:#1e1f22;--bg-1:#2b2d31;--bg-2:#313338;--bg-3:#383a40;
            --bg-chat:#313338;--bg-input:#383a40;--bg-hover:rgba(255,255,255,.06);
            --bg-active:#404249;--bg-float:#111214;
            --tx-1:#f2f3f5;--tx-2:#b5bac1;--tx-m:#949ba4;--tx-link:#00a8fc;
            --ac:#5865f2;--ac-h:#4752c4;--gn:#23a559;--rd:#da373c;--yl:#f0b232;
            --t1:#ff6b9d;--t2:#c44dff;
            --bd:rgba(0,0,0,.24);--r:8px;--rs:4px;
            --tr:all .15s ease;--fm:14px;
            --header-h:48px;--sidebar-w:240px;--server-w:72px;--member-w:240px;
        }

        /* Önceki Temel Stiller */
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--bg-0);color:var(--tx-1);overflow:hidden}
        
        /* SPLASH */
        #splash{position:fixed;inset:0;background:var(--bg-0);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
        #splash.hide{opacity:0;pointer-events:none}
        .spl-logo{width:80px;height:80px;background:var(--ac);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;color:#fff;margin-bottom:16px;animation:spl-pulse 2s infinite}
        @keyframes spl-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
        .spl-bar{width:160px;height:3px;background:var(--bg-3);border-radius:2px;overflow:hidden;margin-top:12px}
        .spl-fill{height:100%;background:var(--ac);border-radius:2px;animation:spl-load 1.2s ease forwards}
        @keyframes spl-load{from{width:0}to{width:100%}}

        /* APP LAYOUT */
        #appPage{display:none;height:100vh;width:100vw}
        #appPage.show{display:block}
        .app-wrap{display:flex;height:100%}

        /* SIDEBARS & MAIN */
        .servers{width:var(--server-w);background:var(--bg-0);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:8px;overflow-y:auto}
        .sidebar{width:var(--sidebar-w);background:var(--bg-1);display:flex;flex-direction:column}
        .main{flex:1;display:flex;flex-direction:column;background:var(--bg-chat);min-width:0}
        .chat-head{height:var(--header-h);padding:0 16px;display:flex;align-items:center;box-shadow:0 1px 0 var(--bd);gap:8px}

        /* ===== 1. MOBİL TAM DÜZELTME (EKLENDİ) ===== */
        @media(max-width:768px){
            .servers{
                position:fixed;left:0;top:0;bottom:0;
                width:72px;z-index:200;
                transform:translateX(-100%);
                transition:transform .25s ease;
            }
            .sidebar{
                position:fixed;left:72px;top:0;bottom:0;
                width:calc(100vw - 72px);max-width:280px;z-index:199;
                transform:translateX(calc(-100% - 72px));
                transition:transform .25s ease;
            }
            .app-wrap.mob-open .servers{transform:translateX(0)}
            .app-wrap.mob-open .sidebar{transform:translateX(0)}
            .mobile-overlay{
                position:fixed;inset:0;background:rgba(0,0,0,.5);
                z-index:198;display:none;
            }
            .app-wrap.mob-open .mobile-overlay{display:block}
            .mobile-toggle{display:flex!important}
            .members{display:none!important}
            .head-search{display:none}
            #authPage{padding:12px}
            .auth-card{padding:20px;max-height:95vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
            .auth-card h2{font-size:20px}
            .inp{font-size:16px!important;padding:12px}
            .msg-box-btn{width:40px;height:40px}
            #msgInput{font-size:16px!important}
            .emoji-pick{position:fixed;bottom:0;left:0;right:0;width:100%;border-radius:12px 12px 0 0;max-height:50vh}
            .mention-popup{position:fixed;bottom:60px;left:10px;right:10px;max-height:40vh}
            #profilePopup{position:fixed;width:90vw;max-width:320px;top:50%!important;left:50%!important;transform:translate(-50%,-50%)!important}
        }
        @media(max-width:380px){
            .auth-card{padding:16px}
            .srv{width:42px;height:42px;font-size:15px}
            .servers{width:56px}
        }

        /* Diğer gerekli CSS sınıfları (Eksikler tamamlandı) */
        .mobile-toggle{display:none; width:36px;height:36px;align-items:center;justify-content:center;cursor:pointer;color:var(--tx-m);font-size:20px}
        .mention{background:rgba(88,101,242,.15);color:#5865f2;padding:0 3px;border-radius:3px;cursor:pointer;font-weight:500}
        .mention-item{display:flex;align-items:center;gap:8px;padding:8px;cursor:pointer}
        .mention-item.sel{background:var(--ac);color:#fff}
        .mi-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px}
        #authPage{display:flex; min-height:100vh; background:var(--ac); align-items:center; justify-content:center}
        .auth-card{background:var(--bg-float); padding:32px; border-radius:8px; width:400px}
        .inp{width:100%; padding:10px; background:var(--bg-0); border:none; color:#fff; margin-bottom:10px; border-radius:4px}
        .auth-btn{width:100%; padding:12px; background:var(--ac); border:none; color:#fff; cursor:pointer; font-weight:600}
    </style>
</head>
<body>

<div id="splash">
    <div class="spl-logo"><i class="fas fa-comments"></i></div>
    <div style="font-size:20px;font-weight:800">Lorensa Chat</div>
    <div style="font-size:11px;color:var(--tx-m);margin-top:4px">Yapımcı: Muhammed Zahit Eryavuz</div>
    <div class="spl-bar"><div class="spl-fill"></div></div>
</div>

<div id="authPage">
    <div class="auth-card">
        <h2>Tekrar Hoş Geldin!</h2>
        <div style="margin-top:20px">
            <input type="text" id="lEmail" class="inp" placeholder="Email veya Kullanıcı Adı">
            <input type="password" id="lPass" class="inp" placeholder="Şifre">
            <button class="auth-btn" onclick="doLogin()">Giriş Yap</button>
        </div>
    </div>
</div>

<div id="appPage">
    <div class="app-wrap" id="appWrap">
        <!-- 6. Mobil Overlay (EKLENDİ) -->
        <div class="mobile-overlay" onclick="toggleMobileSidebar()"></div>

        <div class="servers">
            <div class="srv home"><i class="fas fa-home"></i></div>
            <div class="srv-sep"></div>
            <!-- Sunucular buraya gelecek -->
        </div>
        <div class="sidebar">
            <div class="side-head" onclick="toggleMobileSidebar()">
                <span>Lorensa Sunucusu</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="channels">
                <!-- Kanallar -->
            </div>
        </div>
        <div class="main">
            <div class="chat-head">
                <div class="mobile-toggle" onclick="toggleMobileSidebar()">
                    <i class="fas fa-bars"></i>
                </div>
                <div class="ch-icon">#</div>
                <div class="ch-title">genel</div>
            </div>
            <div class="messages" id="messages">
                <!-- Mesajlar -->
            </div>
            <div class="msg-form">
                <div id="mentionPopup" class="mention-popup"></div>
                <div class="msg-box">
                    <button class="msg-box-btn"><i class="fas fa-plus-circle"></i></button>
                    <textarea id="msgInput" placeholder="#genel kanalına mesaj gönder" oninput="checkMention(this)"></textarea>
                    <button class="msg-box-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const $ = id => document.getElementById(id);
    
    // Basit DB simülasyonu
    const DB = {
        g: key => JSON.parse(localStorage.getItem(key) || (key === 'users' ? '[]' : '{}')),
        s: (key, val) => localStorage.setItem(key, JSON.stringify(val))
    };

    let me = null;
    let curSrv = null;
    let mentionIdx = -1;

    // Splash ekranını kapat
    setTimeout(() => {
        $('splash').classList.add('hide');
    }, 1500);

    // ===== 2. HESAP BULMA DÜZELTMESİ (GÜNCELLENDİ) =====
    function doLogin(){
        const e=$('lEmail').value.trim().toLowerCase();
        const p=$('lPass').value;
        if(!e||!p) return alert('Tüm alanları doldurmalısın.');
        
        const users = DB.g('users');
        const u = users.find(x => 
            (x.email?.toLowerCase() === e || 
             x.username?.toLowerCase() === e || 
             x.displayName?.toLowerCase() === e) && 
            x.password === p
        );

        if(!u) return alert('Giriş bilgileri hatalı. Lütfen tekrar deneyin.');
        if(u.banned) return alert('Bu hesap devre dışı bırakılmış.');

        u.status = 'online';
        DB.s('users', users);
        me = u;
        enterApp();
    }

    function enterApp() {
        $('authPage').style.display = 'none';
        $('appPage').classList.add('show');
    }

    // ===== 3. KULLANICI ETİKETLEME (@mention) (GÜNCELLENDİ) =====
    function formatText(t){
        if(!t) return '';
        const users = DB.g('users');
        
        t = t.replace(/@everyone/g,'<span class="mention">@everyone</span>');
        t = t.replace(/@here/g,'<span class="mention">@here</span>');
        
        t = t.replace(/@(\S+)/g, (match, name) => {
            const u = users.find(x => 
                x.username.toLowerCase() === name.toLowerCase() || 
                x.displayName.toLowerCase() === name.toLowerCase()
            );
            return u ? `<span class="mention" onclick="showProfile('${u.id}')">@${u.displayName}</span>` : match;
        });

        // Markdown İşlemleri
        t = t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
        t = t.replace(/\*(.*?)\*/g,'<em>$1</em>');
        t = t.replace(/```([\s\S]*?)
```/g,'<pre style="background:var(--bg-0);padding:8px;border-radius:4px">$1</pre>');
        t = t.replace(/\n/g,'<br>');
        return t;
    }

    function checkMention(textarea){
        const val = textarea.value;
        const pos = textarea.selectionStart;
        const before = val.substring(0, pos);
        const match = before.match(/@(\S*)$/);
        
        const popup = $('mentionPopup');
        if(match){
            const query = match[1].toLowerCase();
            const users = DB.g('users');
            let results = users.filter(u => 
                u.username.toLowerCase().includes(query) || 
                u.displayName.toLowerCase().includes(query)
            ).slice(0, 8);

            if(results.length > 0){
                popup.innerHTML = results.map((u, i) => `
                    <div class="mention-item" onclick="insertMention('${u.username}')">
                        <div class="mi-av" style="background:#5865f2">${u.displayName[0].toUpperCase()}</div>
                        <span class="mi-name">${u.displayName}</span>
                    </div>
                `).join('');
                popup.classList.add('show');
                return;
            }
        }
        popup.classList.remove('show');
    }

    function insertMention(username) {
        const input = $('msgInput');
        input.value = input.value.replace(/@(\S*)$/, `@${username} `);
        $('mentionPopup').classList.remove('show');
        input.focus();
    }

    // ===== 4. PROFİL & AVATAR DÜZELTMESİ (GÜNCELLENDİ) =====
    function hasTurbo(user) { return user && user.isTurbo; }

    function changeAvatar(){
        const inp = document.createElement('input');
        inp.type = 'file';
        inp.accept = 'image/png,image/jpg,image/jpeg,image/webp';
        inp.onchange = e => {
            const f = e.target.files[0];
            if(!f) return;
            const maxSize = hasTurbo(me) ? 50*1024*1024 : 8*1024*1024;
            if(f.size > maxSize) return alert('Dosya çok büyük!');
            if(f.type === 'image/gif' && !hasTurbo(me)) return alert('GIF avatar için Turbo gerekir!');
            
            const r = new FileReader();
            r.onload = ev => {
                const users = DB.g('users');
                const u = users.find(x => x.id === me.id);
                u.avatar = ev.target.result;
                DB.s('users', users);
                me = u;
                alert('Profil fotoğrafı güncellendi!');
            };
            r.readAsDataURL(f);
        };
        inp.click();
    }

    // ===== 5. ROZET SİSTEMİ (GÜNCELLENDİ) =====
    function checkBadges(){
        const users = DB.g('users');
        const u = users.find(x => x.id === me.id);
        if(!u.badges) u.badges = [];
        
        // Örnek mantık: Mesaj sayısına göre rozet (Burada DB.g('messages') yapınıza göre saymalısınız)
        const newBadges = [];
        // Rozet koşulları buraya... (50 mesaj, 1 haftalık üyelik vb.)
        
        if(newBadges.length > 0){
            DB.s('users', users);
            me = u;
            newBadges.forEach(b => showNotification('Yeni Rozet!', b));
        }
    }

    function showNotification(title, text){
        const notif = document.createElement('div');
        notif.style.cssText = 'position:fixed;top:20px;right:20px;background:var(--bg-float);border:1px solid var(--bd);border-radius:8px;padding:12px;z-index:9999;animation:slideIn .3s ease';
        notif.innerHTML = `<b>${title}</b><br><small>${text}</small>`;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 3000);
    }

    // ===== 6. MOBİL TOGGLE DÜZELTMESİ =====
    function toggleMobileSidebar(){
        $('appWrap').classList.toggle('mob-open');
    }

    // Mesaj Gönderme
    function sendMessage() {
        const input = $('msgInput');
        if(!input.value.trim()) return;
        
        // Mesajı ekrana basma ve kaydetme kodların...
        
        input.value = '';
        checkBadges(); // Mesajdan sonra rozet kontrolü
    }
</script>

</body>
</html>
